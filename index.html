<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Link hub personal" />
  <title>Links · @nico</title>

  <!-- Prevent flash of wrong theme -->
  <script>
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>

  <link rel="stylesheet" href="style.css" />

  <!-- Favicon simple -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23141414'/><text y='22' x='5' font-size='18'>🔗</text></svg>" />
</head>
<body>

  <!-- Dark / Light toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">☀️</button>

  <!-- Phone shell — content is injected by app.js -->
  <main id="phone" class="phone" role="main" aria-label="Tarjeta de perfil">
    <!-- skeleton rendered by JS before data loads -->
  </main>

  <script src="app.js"></script>
</body>
</html>
